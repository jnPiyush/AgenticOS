<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Playmates - PawConnect</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <div class="logo">
            <i class="fa-solid fa-paw"></i> Find Playmates
        </div>
        <div>
            <button class="btn-outline" aria-label="Filter Preferences"><i class="fa-solid fa-sliders"></i></button>
        </div>
    </header>

    <main class="container" style="max-width: 500px; height: 80vh; display: flex; flex-direction: column; justify-content: center;">
        
        <!-- Match Card -->
        <div class="card match-card" style="background-image: url('https://images.unsplash.com/photo-1543466835-00a7907e9de1?auto=format&fit=crop&w=600&q=80'); background-size: cover; background-position: center;">
            <div class="badge" style="position: absolute; top: 1rem; left: 1rem;">
                <i class="fa-solid fa-bolt"></i> 95% Match
            </div>
            <div class="match-info">
                <h2>Rambo, 3</h2>
                <p><i class="fa-solid fa-location-dot"></i> 2 miles away</p>
                <div class="flex gap-2" style="margin-top: 0.5rem;">
                    <span class="badge" style="background: rgba(255,255,255,0.2); color: white;">Beagle</span>
                    <span class="badge" style="background: rgba(255,255,255,0.2); color: white;">High Energy</span>
                </div>
            </div>
        </div>

        <!-- Bio Snippet -->
        <div style="text-align: center; margin-bottom: 2rem;">
            <p>"Loves chasing squirrels and playing fetch. Very friendly with other dogs!"</p>
        </div>

        <!-- Actions -->
        <div class="match-actions">
            <button class="action-btn btn-pass" aria-label="Pass">
                <i class="fa-solid fa-xmark"></i>
            </button>
            <button class="action-btn" style="width: 40px; height: 40px; font-size: 1rem; color: #888;" aria-label="Info">
                <i class="fa-solid fa-info"></i>
            </button>
            <button class="action-btn btn-like" aria-label="Like and Connect">
                <i class="fa-solid fa-heart"></i>
            </button>
        </div>

    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <i class="fa-solid fa-house nav-icon"></i>
            <span class="nav-label">Feed</span>
        </a>
        <a href="matching.html" class="nav-item active">
            <i class="fa-solid fa-wand-magic-sparkles nav-icon"></i>
            <span class="nav-label">Match</span>
        </a>
        <a href="events.html" class="nav-item">
            <i class="fa-regular fa-calendar nav-icon"></i>
            <span class="nav-label">Events</span>
        </a>
        <a href="services.html" class="nav-item">
            <i class="fa-solid fa-store nav-icon"></i>
            <span class="nav-label">Services</span>
        </a>
        <a href="profile.html" class="nav-item">
            <i class="fa-regular fa-user nav-icon"></i>
            <span class="nav-label">Profile</span>
        </a>
    </nav>
</body>
</html>
